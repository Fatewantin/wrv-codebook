<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg:#111318; --panel:#1a1d24; --panel2:#20242c; --line:#2c313b;
  --amber:#ffb454; --amber-dim:#8a6a3a; --lcd-bg:#201808;
  --green:#8be28f; --red:#ff6f61;
  --text:#e8e6e1; --mut:#98a0ad;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --disp:'Barlow Condensed',system-ui,sans-serif;
  --body:system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg)}
.rig{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--body);
  max-width:560px;margin:0 auto;
  padding:calc(14px + env(safe-area-inset-top)) 14px calc(86px + env(safe-area-inset-bottom));}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
button:focus-visible,input:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px}
.hide{display:none !important}

.head{display:flex;justify-content:space-between;align-items:flex-start;padding:2px 2px 12px}
.brand{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:.06em;line-height:1}
.brand-sub{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--mut);margin-top:5px}
.led-stack{display:flex;align-items:center;gap:6px;padding-top:6px}
.led{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.led-lab{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--mut)}

.lcd{background:var(--lcd-bg);border:1px solid #3a2d12;border-radius:8px;
  padding:12px 14px;box-shadow:inset 0 2px 12px rgba(0,0,0,.7), 0 0 0 3px #0c0e12;
  position:relative;overflow:hidden;margin-bottom:12px;
  background-image:repeating-linear-gradient(0deg, rgba(255,180,84,.05) 0 1px, transparent 1px 3px);}
.lcd-main{font-family:var(--mono);font-weight:600;font-size:26px;letter-spacing:.08em;
  color:var(--amber);text-shadow:0 0 10px rgba(255,180,84,.5);white-space:nowrap;overflow:hidden}
.lcd-sub{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--amber-dim);margin-top:3px}
.lcd-hot .lcd-main{color:var(--green);text-shadow:0 0 10px rgba(139,226,143,.5)}
.cursor{display:inline-block;width:.55em;height:1em;background:var(--amber);margin-left:4px;
  vertical-align:-.12em;animation:blink 1.1s steps(1) infinite}
.lcd-hot .cursor{background:var(--green)}
@keyframes blink{50%{opacity:0}}
@media (prefers-reduced-motion: reduce){.cursor{animation:none}}

.searchwrap{position:relative;margin-bottom:10px}
.search{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:8px;
  color:var(--text);font-family:var(--mono);font-size:16px;padding:11px 38px 11px 12px;-webkit-appearance:none}
.search::placeholder{color:#6b7280}
.clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);color:var(--mut);
  padding:6px 10px;font-size:14px}

.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;font-family:var(--mono);font-size:11px;letter-spacing:.1em;
  color:var(--mut);border:1px solid var(--line);border-radius:6px;padding:7px 11px;background:var(--panel)}
.chip-on{color:var(--amber);border-color:var(--amber-dim);background:#241d10}
.chip-wide{margin-bottom:10px}

.list{border-top:1px solid var(--line)}
.row{display:flex;align-items:stretch;border-bottom:1px solid var(--line)}
.row-hot{border-left:2px solid var(--red);padding-left:2px}
.row-main{flex:1;display:flex;align-items:baseline;gap:12px;text-align:left;padding:11px 4px;min-width:0}
.row-main:active{background:var(--panel)}
.code{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--amber);flex:0 0 96px;white-space:nowrap}
.meaning{font-size:13.5px;color:var(--text);line-height:1.35;min-width:0}
.star{flex:0 0 auto;color:#4a5160;font-size:16px;padding:0 12px}
.star-on{color:var(--amber)}

.empty{padding:34px 8px;text-align:center}
.empty-h{font-family:var(--mono);letter-spacing:.2em;font-size:12px;color:var(--amber-dim)}
.empty-p{color:var(--mut);font-size:13px;margin-top:8px;line-height:1.5}
.starterwrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
.starter{font-family:var(--mono);font-size:12px;color:var(--amber);border:1px solid var(--amber-dim);
  border-radius:6px;padding:8px 12px;background:#241d10}

.pane{padding-top:2px}
.pane-note{color:var(--mut);font-size:13px;margin-bottom:10px;line-height:1.5}
.readout{display:flex;flex-wrap:wrap;gap:8px;align-items:center;width:100%;text-align:left;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:10px}
.ph{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--amber)}
.ph+.ph::before{content:"– ";color:var(--mut);font-weight:500}
.readout-hint{width:100%;font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--mut);margin-top:2px}
.alpha{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:6px;margin-top:16px}
.alpha-cell{display:flex;gap:8px;align-items:baseline;background:var(--panel);border:1px solid var(--line);
  border-radius:6px;padding:8px 10px}
.alpha-k{font-family:var(--mono);font-weight:600;color:var(--amber);font-size:13px}
.alpha-v{font-size:12.5px;color:var(--text)}

.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:26px 18px;
  text-align:center;margin-top:6px}
.card-q{font-size:17px;line-height:1.45;min-height:52px;display:flex;align-items:center;justify-content:center}
.card-a{font-family:var(--mono);font-weight:600;font-size:22px;color:var(--green);margin-top:16px}
.card-btns{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;font-family:var(--mono);font-size:12px;letter-spacing:.12em;border-radius:8px;padding:13px 8px;
  border:1px solid var(--line);background:var(--panel2)}
.btn-show{margin-top:18px;width:100%;color:var(--amber);border-color:var(--amber-dim)}
.btn-hit{color:var(--green);border-color:#3a5a3e}
.btn-miss{color:var(--red);border-color:#5a3a38}
.score{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--mut);
  text-align:center;margin-top:16px}

.dock{position:fixed;left:0;right:0;bottom:0;display:flex;max-width:560px;margin:0 auto;
  background:rgba(17,19,24,.96);backdrop-filter:blur(6px);border-top:1px solid var(--line)}
.dock-btn{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--mut);
  padding:15px 0 calc(15px + env(safe-area-inset-bottom));border-top:2px solid transparent}
.dock-on{color:var(--amber);border-top-color:var(--amber)}
</style>
</head>

           placeholder="e.g. 7B44921 or FATE" aria-label="Word to spell">
    <button class="readout hide" id="readout"></button>
    <div class="alpha" id="alpha"></div>
  </section>

  <!-- DRILL -->
  <section id="paneDrill" class="pane hide">
    <div class="chips" id="poolChips"></div>
    <button class="chip chip-wide" id="dirBtn">MEANING → CODE ⇄</button>
    <div id="drillBody"></div>
    <div class="score" id="score">SESSION 0/0</div>
  </section>

  <nav class="dock" aria-label="Sections">
    <button class="dock-btn dock-on" data-tab="codes">CODES</button>
    <button class="dock-btn" data-tab="spell">SPELL</button>
    <button class="dock-btn" data-tab="drill">DRILL</button>
  </nav>
</div>

const $ = (id) => document.getElementById(id);
const norm = (s) => s.toLowerCase().replace(/[^a-z0-9]/g, "");
const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function copyText(t) {
  return new Promise((res) => {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(()=>res(true)).catch(fallback);
    } else fallback();
    function fallback() {
      try {
        const ta = document.createElement("textarea");
        ta.value = t; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); document.body.removeChild(ta); res(true);
      } catch (e) { res(false); }
    }
  });
}

/* ---------------- LCD ---------------- */
let flashTimer = null;
function setLcd(main, sub, hot) {
  $("lcdMain").textContent = main;
  $("lcdSub").textContent = sub;
  $("lcd").classList.toggle("lcd-hot", !!hot);
}
function lcdIdle(results) {
  if (flashTimer) return;
  if (q.trim()) setLcd(q.trim().toUpperCase().slice(0,14), results.length + " MATCH" + (results.length===1?"":"ES"));
  else setLcd("STANDBY", results.length + " ENTRIES • " + cat.toUpperCase());
}
function flash(main, sub) {
  setLcd(main, sub, true);
  if (flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { flashTimer = null; setLcd("STANDBY","SQUELCH CLOSED"); }, 1600);
}

/* ---------------- CODES TAB ---------------- */
function getResults() {
  let rows = cat==="all" ? D : cat==="fav" ? D.filter(r=>favs.has(r.c)) : D.filter(r=>r.cat===cat);
  const nq = norm(q);
  if (nq) rows = rows.filter(r => norm(r.c).includes(nq) || r.m.toLowerCase().includes(q.toLowerCase().trim()));
  return rows;
}

function renderChips() {
  $("chips").innerHTML = CATS.map(c =>
    `<button class="chip${cat===c.id?" chip-on":""}" data-cat="${c.id}">${c.label}</button>`).join("");
}

function renderList() {
  const results = getResults();
  const list = $("list");
  if (!results.length) {
    if (cat==="fav" && !q) {
      list.innerHTML = `<div class="empty"><p class="empty-h">NO STARRED CODES</p>
        <p class="empty-p">Star the ones you two actually use. Suggested starters:</p>
        <div class="starterwrap">${STARTERS.map(s=>`<button class="starter" data-star="${s}">★ ${s}</button>`).join("")}</div></div>`;
    } else {
      list.innerHTML = `<div class="empty"><p class="empty-h">NO TRAFFIC</p>
        <p class="empty-p">Nothing matches "${esc(q)}". Try fewer letters or a different category.</p></div>`;
    }
  } else {
    list.innerHTML = results.map(r =>
      `<div class="row${r.f?" row-hot":""}">
        <button class="row-main" data-copy="${esc(r.c)}">
          <span class="code">${esc(r.c)}</span><span class="meaning">${esc(r.m)}</span>
        </button>
        <button class="star${favs.has(r.c)?" star-on":""}" data-fav="${esc(r.c)}" aria-label="Toggle star">★</button>
      </div>`).join("");
  }
  lcdIdle(results);
}

$("list").addEventListener("click", async (e) => {
  const copyBtn = e.target.closest("[data-copy]");
  const favBtn  = e.target.closest("[data-fav]");
  const starter = e.target.closest("[data-star]");
  if (favBtn) {
    const c = favBtn.dataset.fav;
    favs.has(c) ? favs.delete(c) : favs.add(c);
    saveFavs(); renderList(); return;
  }
  if (starter) { favs.add(starter.dataset.star); saveFavs(); renderList(); return; }
  if (copyBtn) {
    const c = copyBtn.dataset.copy;
    const row = D.find(r=>r.c===c);
    const ok = await copyText(c);
    flash(c.toUpperCase().slice(0,14), ok ? "COPIED TO CLIPBOARD" : row.m.toUpperCase().slice(0,26));
  }
});

$("chips").addEventListener("click", (e) => {
  const b = e.target.closest("[data-cat]");
  if (!b) return;
  cat = b.dataset.cat; renderChips(); renderList();
});

$("q").addEventListener("input", (e) => {
  q = e.target.value;
  $("clearBtn").classList.toggle("hide", !q);
  renderList();
});
$("clearBtn").addEventListener("click", () => {
  q = ""; $("q").value = ""; $("clearBtn").classList.add("hide"); renderList(); $("q").focus();
});

/* ---------------- SPELL TAB ---------------- */
$("alpha").innerHTML = Object.entries(PHONETIC).filter(([k])=>/[A-Z]/.test(k))
  .map(([k,v])=>`<div class="alpha-cell"><span class="alpha-k">${k}</span><span class="alpha-v">${v}</span></div>`).join("");

let spellOut = "";
$("spellIn").addEventListener("input", (e) => {
  const parts = e.target.value.toUpperCase().split("").map(ch=>PHONETIC[ch]).filter(Boolean);
  spellOut = parts.join(" – ");
  const ro = $("readout");
  if (!parts.length) { ro.classList.add("hide"); return; }
  ro.classList.remove("hide");
  ro.innerHTML = parts.map(p=>`<span class="ph">${p}</span>`).join("") +
    `<span class="readout-hint">tap to copy</span>`;
});
$("readout").addEventListener("click", async () => {
  if (!spellOut) return;
  await copyText(spellOut);
  flash("COPIED","PHONETIC STRING");
});

/* ---------------- DRILL TAB ---------------- */
const POOLS = [
  { id:"fav", label:"★ STARRED" },{ id:"ten", label:"10-CODES" },
  { id:"codeN", label:"CODE #" },{ id:"all", label:"ALL" }
];
let pool = "ten", dir = "m2c", card = null, shown = false;
let score = { right:0, total:0, streak:0 };

function poolRows() {
  if (pool==="fav") return D.filter(r=>favs.has(r.c));
  if (pool==="all") return D;
  return D.filter(r=>r.cat===pool);
}
function draw() {
  const rows = poolRows();
  if (!rows.length) { card = null; renderDrill(); return; }
  let next = rows[Math.floor(Math.random()*rows.length)];
  if (rows.length>1 && card && next.c===card.c) next = rows[(rows.indexOf(next)+1)%rows.length];
  card = next; shown = false; renderDrill();
}
function renderDrill() {
  $("poolChips").innerHTML = POOLS.map(p =>
    `<button class="chip${pool===p.id?" chip-on":""}" data-pool="${p.id}">${p.label}</button>`).join("");
  $("dirBtn").textContent = (dir==="m2c" ? "MEANING → CODE" : "CODE → MEANING") + " ⇄";
  const body = $("drillBody");
  if (!card) {
    body.innerHTML = `<div class="empty"><p class="empty-h">EMPTY POOL</p>
      <p class="empty-p">Star some codes on the Codes tab, then drill them here.</p></div>`;
  } else {
    body.innerHTML = `<div class="card">
      <div class="card-q">${esc(dir==="m2c" ? card.m : card.c)}</div>
      ${shown
        ? `<div class="card-a">${esc(dir==="m2c" ? card.c : card.m)}</div>
           <div class="card-btns">
             <button class="btn btn-miss" data-grade="0">MISSED</button>
             <button class="btn btn-hit" data-grade="1">GOT IT</button>
           </div>`
        : `<button class="btn btn-show" id="showBtn">SHOW ANSWER</button>`}
    </div>`;
  }
  $("score").textContent = score.total>0
    ? `${score.right}/${score.total} CORRECT • STREAK ${score.streak}` : "SESSION 0/0";
}
$("paneDrill").addEventListener("click", (e) => {
  const p = e.target.closest("[data-pool]");
  if (p) { pool = p.dataset.pool; draw(); return; }
  if (e.target.closest("#dirBtn")) { dir = dir==="m2c"?"c2m":"m2c"; draw(); return; }
  if (e.target.closest("#showBtn")) { shown = true; renderDrill(); return; }
  const g = e.target.closest("[data-grade]");
  if (g) {
    const ok = g.dataset.grade==="1";
    score = { right: score.right+(ok?1:0), total: score.total+1, streak: ok?score.streak+1:0 };
    draw();
  }
});

/* ---------------- TABS ---------------- */
document.querySelector(".dock").addEventListener("click", (e) => {
  const b = e.target.closest("[data-tab]");
  if (!b) return;
  tab = b.dataset.tab;
  document.querySelectorAll(".dock-btn").forEach(x=>x.classList.toggle("dock-on", x===b));
  $("paneCodes").classList.toggle("hide", tab!=="codes");
  $("paneSpell").classList.toggle("hide", tab!=="spell");
  $("paneDrill").classList.toggle("hide", tab!=="drill");
  if (tab==="drill") { if (pool==="fav" && !favs.size) pool = "ten"; draw(); }
  if (tab==="codes") renderList();
});

/* ---------------- BOOT ---------------- */
if (favs.size >= 4) pool = "fav";
renderChips(); renderList(); renderDrill();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
</script>
</body>
</html>
